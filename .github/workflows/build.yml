name: build-desktop

permissions:
  contents: write

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main, "codex/**"]
    tags: ["v*"]

jobs:
  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build

  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            bundles: app,dmg
            artifact_name: macos-arm64-[bundle]
          - platform: windows-latest
            target: ""
            bundles: nsis,msi
            artifact_name: windows-x64-[bundle]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm ci
      - name: Build workflow artifacts
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: tauri-apps/tauri-action@v1
        with:
          args: ${{ matrix.target != '' && format('--target {0} --bundles {1}', matrix.target, matrix.bundles) || format('--bundles {0}', matrix.bundles) }}
          uploadWorkflowArtifacts: true
          workflowArtifactNamePattern: ${{ matrix.artifact_name }}
      - name: Build and publish GitHub Release
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.target != '' && format('--target {0} --bundles {1}', matrix.target, matrix.bundles) || format('--bundles {0}', matrix.bundles) }}
          tagName: ${{ github.ref_name }}
          releaseName: Flashnote ${{ github.ref_name }}
          releaseBody: |
            Flashnote 桌面安装包。

            - macOS Apple Silicon：下载 `.dmg`
            - Windows：推荐下载 `setup.exe`，企业部署可使用 `.msi`
          releaseDraft: false
          prerelease: false
          uploadWorkflowArtifacts: true
          workflowArtifactNamePattern: ${{ matrix.artifact_name }}
